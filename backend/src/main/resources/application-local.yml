# =====================================================
# 로컬 개발 프로필
# docker-compose.local.yml 로 띄운 PostgreSQL 16 에 접속
# 비밀번호는 환경변수 오버라이드 패턴 (코드 하드코딩 금지 원칙)
# =====================================================
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/workout_tracker}
    username: ${DB_USERNAME:workout}
    password: ${DB_PASSWORD:workout_pw_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: WorkoutTrackerHikariCP

  jpa:
    show-sql: true

  # Refresh Token 저장소 (docker-compose.local.yml 의 redis 컨테이너)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s

# =====================================================
# JWT 설정 (Access / Refresh 시크릿 분리)
# - 둘 중 하나가 유출돼도 다른 한 쪽은 살아있도록 시크릿 분리 (방어 심층화)
# - 시크릿은 환경변수 우선, 미지정 시 로컬 더미 사용
# - 운영에서는 반드시 SSM Parameter Store SecureString 으로 주입
# =====================================================
jwt:
  access:
    secret: ${JWT_ACCESS_SECRET:dummy-local-access-secret-at-least-32-characters-long-OK}
    expires-in-seconds: ${JWT_ACCESS_EXPIRES_IN:900}      # 15분
  refresh:
    secret: ${JWT_REFRESH_SECRET:dummy-local-refresh-secret-at-least-32-characters-long-OK}
    expires-in-seconds: ${JWT_REFRESH_EXPIRES_IN:1209600} # 14일

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
