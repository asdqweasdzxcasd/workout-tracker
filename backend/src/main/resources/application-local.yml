# =====================================================
# 로컬 개발 프로필
# docker-compose.local.yml 로 띄운 PostgreSQL 16 에 접속
# 비밀번호는 환경변수 오버라이드 패턴 (코드 하드코딩 금지 원칙)
# =====================================================
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/workout_tracker}
    username: ${DB_USERNAME:workout}
    password: ${DB_PASSWORD:workout_pw_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: WorkoutTrackerHikariCP

  jpa:
    show-sql: true

# =====================================================
# JWT 설정
# - 시크릿은 환경변수 JWT_SECRET 우선, 미지정 시 로컬 더미 사용
# - 운영(Day 6)에서는 반드시 EC2 환경변수로 주입
# =====================================================
jwt:
  secret: ${JWT_SECRET:dummy-local-secret-at-least-32-characters-long-for-hs256-algorithm-OK}
  expires-in-seconds: 3600

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
