# =====================================================
# workout-tracker 기본 설정 (모든 프로필 공통)
# 환경별 오버라이드는 application-{profile}.yml 에 작성
# 실행 시 SPRING_PROFILES_ACTIVE 환경변수로 프로필 선택
# 로컬 개발은 SPRING_PROFILES_ACTIVE=local
# =====================================================
spring:
  application:
    name: workout-tracker
  # 기본 프로필: 명시적으로 지정하지 않으면 local 사용
  profiles:
    default: local

  # JPA / Hibernate 공통 설정
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          # JDBC 드라이버에 KST 명시 (TIMESTAMPTZ <-> OffsetDateTime 변환 기준)
          time_zone: Asia/Seoul
    hibernate:
      # Flyway가 스키마를 관리하므로 Hibernate는 절대 DDL을 만지지 않음
      ddl-auto: validate

  # Jackson JSON 직렬화 timezone (응답에 표시되는 시간을 KST 로 통일)
  jackson:
    time-zone: Asia/Seoul

  # Flyway 마이그레이션 (부트 시 자동 실행)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # =====================================================
  # OAuth2 소셜 로그인 (D.3) — 구글(OIDC) + 네이버/카카오(커스텀 OAuth2)
  # - 시크릿은 환경변수 주입 (로컬: backend/.env.local, 운영: SSM Parameter Store)
  # - dummy fallback 은 부트 실패 방지용 — 실제 로그인 시도 시에만 실패한다
  # - redirect-uri 는 각 provider 콘솔에 등록된 {baseUrl}/login/oauth2/code/{registrationId}
  # =====================================================
  security:
    oauth2:
      client:
        registration:
          google:
            # 구글은 Spring 내장 provider(OIDC issuer) 사용 — registration 만 정의
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope:
              - openid
              - profile
              - email
          naver:
            client-id: ${NAVER_CLIENT_ID:dummy-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:dummy}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Naver
            # 네이버는 scope 파라미터 대신 콘솔의 '제공 정보' 설정을 따른다 (이메일·별명)
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Kakao
            scope:
              - profile_nickname
              # account_email 은 비즈 앱 전환 후에만 추가 가능 (이메일 없음 케이스는 코드에서 처리)
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            # 네이버 UserInfo 는 실제 데이터가 response 객체에 중첩돼 있다
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080
  # ALB 뒤에서 X-Forwarded-Proto/Host 를 반영해 redirect_uri 가 https 로 생성되게 함
  forward-headers-strategy: framework

# =====================================================
# 앱 커스텀 설정
# =====================================================
app:
  oauth2:
    # 소셜 로그인 성공 시 exchange code 를 붙여 보낼 프론트 콜백 (?code= 추가됨)
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:3000/oauth/callback}
    # 실패(동의 거부, state 오류 등) 시 돌려보낼 프론트 로그인 화면
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:3000/login?error=oauth}

# springdoc-openapi: /swagger-ui/index.html
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# =====================================================
# AWS S3 (Phase 5 - 인증샷)
# - region/bucket 은 환경변수로 오버라이드 (코드 하드코딩 금지)
# - 자격증명은 DefaultCredentialsProvider 가 자동 탐색
#   (운영 EC2: IAM Role / 로컬: AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY)
# =====================================================
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    # fallback 은 로컬 dev 용 placeholder. 운영은 환경변수 AWS_S3_BUCKET 으로 주입.
    bucket: ${AWS_S3_BUCKET:workout-tracker-photos-local}
    # PUT presigned URL 유효 시간 (초) - 업로드 직후 사용
    presign-upload-expires-sec: ${AWS_S3_PRESIGN_UPLOAD_EXPIRES_SEC:300}
    # GET presigned URL 유효 시간 (초) - 갤러리 로딩 후 짧은 시간만 유효
    presign-download-expires-sec: ${AWS_S3_PRESIGN_DOWNLOAD_EXPIRES_SEC:900}
  # SES (이메일 인증 코드 발송, D.2)
  # - SES 는 운영(prod) 프로필에서만 실제 발송. 로컬/테스트는 LogEmailSender 로 로그 출력.
  # - region 미지정 시 위 aws.region 사용. 운영은 SSM 으로 SES_REGION / SES_FROM_ADDRESS 주입.
  ses:
    region: ${SES_REGION:${AWS_REGION:ap-northeast-2}}
    # 로컬 placeholder. 운영(prod)은 환경변수 SES_FROM_ADDRESS 로 검증된 발신주소 주입.
    from-address: ${SES_FROM_ADDRESS:no-reply@example.com}

logging:
  level:
    root: INFO
    com.workouttracker: DEBUG
    org.flywaydb: INFO
