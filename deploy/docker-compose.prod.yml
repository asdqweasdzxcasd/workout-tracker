# =====================================================
# workout-tracker 운영 환경 (AWS EC2 t3.small + ALB)
# - Blue/Green 2 컨테이너 (포트 8080, 8081)
# - ALB Target Group 에 두 포트 다 등록 → Rolling 배포 시 한 쪽씩 교체
# - 재부팅 시 자동 복구: restart: unless-stopped
# - 메모리 제한: 컨테이너당 768MB (t3.small 2GB + Swap 2GB)
# - .env 파일 (옆 디렉토리) 에서 시크릿 주입
#
# 실행:
#   cd deploy
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# 헬스체크 (호스트):
#   curl http://localhost:8080/actuator/health   # Blue
#   curl http://localhost:8081/actuator/health   # Green
#
# Rolling 배포:
#   ./rolling-deploy.sh   (Blue → Green 순으로 재시작)
# =====================================================

# 공통 설정 (YAML anchor 로 두 서비스 공유)
x-backend-common: &backend-common
  build:
    context: ../backend
    dockerfile: Dockerfile
  image: workout-tracker-backend:latest
  restart: unless-stopped
  env_file:
    - .env
  environment:
    TZ: Asia/Seoul
    SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
  mem_limit: 768m
  mem_reservation: 512m
  healthcheck:
    test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 60s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - workout-tracker

services:
  # ----------------------------------------------------
  # Blue 컨테이너 - 호스트 포트 8080
  # ----------------------------------------------------
  workout-tracker-backend-blue:
    <<: *backend-common
    container_name: workout-tracker-backend-blue
    ports:
      - "8080:8080"

  # ----------------------------------------------------
  # Green 컨테이너 - 호스트 포트 8081
  # 같은 이미지를 공유하므로 빌드는 Blue 에서 1회만
  # ----------------------------------------------------
  workout-tracker-backend-green:
    <<: *backend-common
    container_name: workout-tracker-backend-green
    ports:
      - "8081:8080"
    depends_on:
      - workout-tracker-backend-blue

networks:
  workout-tracker:
    name: workout-tracker-network
    driver: bridge
