# =====================================================
# workout-tracker 로컬 개발 환경
# 용도: 로컬 PostgreSQL 16 + Adminer
# 실행: docker compose -f docker-compose.local.yml --env-file .env.local up -d
# 또는: docker compose -f docker-compose.local.yml up -d  (.env.local이 있을 때 자동 로드)
# =====================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: workout-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workout_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-workout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workout_pw_local}
      # 시간대를 KST로 명시 (로그/타임스탬프 일관성)
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - workout_tracker_db_data:/var/lib/postgresql/data
    healthcheck:
      # Spring Boot가 의존하는 경우 healthy 대기 가능
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workout} -d ${POSTGRES_DB:-workout_tracker}"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4-standalone
    container_name: workout-tracker-adminer
    restart: unless-stopped
    # 포트 8081로 노출 (Spring Boot 8080 충돌 회피)
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      postgres:
        condition: service_healthy

  # Refresh Token 세션 저장소 (다중 기기 + rotation + 즉시 무효화)
  # AOF 활성으로 재시작 시 데이터 보존 (로컬 개발 편의)
  redis:
    image: redis:7-alpine
    container_name: workout-tracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - workout_tracker_redis_data:/data

volumes:
  workout_tracker_db_data:
    name: workout_tracker_db_data
  workout_tracker_redis_data:
    name: workout_tracker_redis_data
